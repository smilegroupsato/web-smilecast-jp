<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#0b2f63">
  <title>お問い合わせ｜SMC株式会社</title>
  <link rel="stylesheet" href="./styles.css">
  <style>
    body {
      background: #f4f8fc;
    }
    .contact-page {
      min-height: 100vh;
      padding: 34px 0 72px;
    }
    .contact-page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 42px;
    }
    .contact-page-header a {
      color: #082a57;
      font-size: 14px;
      font-weight: 800;
    }
    .contact-card {
      padding: 54px;
      background: #ffffff;
      border: 1px solid #dce5ef;
      border-radius: 28px;
      box-shadow: 0 24px 60px rgba(8, 42, 87, 0.12);
    }
    .contact-card h1 {
      margin: 0;
      color: #082a57;
      font-size: clamp(36px, 6vw, 64px);
      line-height: 1.22;
      letter-spacing: -0.04em;
    }
    .contact-lead {
      max-width: 720px;
      margin: 24px 0 34px;
      color: #445972;
      font-size: 16px;
      line-height: 2;
    }
    .draft-note {
      margin: 0 0 28px;
      padding: 14px 18px;
      color: #7a5b10;
      background: #fff5d8;
      border: 1px solid #ecd891;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.8;
    }
    .contact-form {
      display: grid;
      gap: 22px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }
    .form-field,
    .form-field-wide,
    .form-radio-group {
      display: grid;
      gap: 9px;
    }
    .form-field-wide,
    .form-radio-group {
      grid-column: 1 / -1;
    }
    .contact-form label,
    .form-label {
      color: #082a57;
      font-size: 14px;
      font-weight: 900;
    }
    .required {
      margin-left: 6px;
      color: #0f6fd6;
      font-size: 11px;
    }
    .contact-form input,
    .contact-form select,
    .contact-form textarea {
      width: 100%;
      padding: 15px 16px;
      color: #10233f;
      background: #f8fbff;
      border: 1px solid #cfdbea;
      border-radius: 13px;
      font: inherit;
      font-size: 15px;
    }
    .contact-form textarea {
      min-height: 170px;
      resize: vertical;
    }
    .radio-options {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .radio-options label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 15px;
      background: #f8fbff;
      border: 1px solid #dce5ef;
      border-radius: 999px;
      color: #30445f;
      font-size: 14px;
      font-weight: 800;
    }
    .radio-options input {
      width: auto;
      margin: 0;
    }
    .form-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 16px;
      margin-top: 8px;
    }
    .submit-disabled {
      border: 0;
      cursor: not-allowed;
    }
    .form-note {
      margin: 0;
      color: #60708a;
      font-size: 13px;
      line-height: 1.8;
    }
    @media (max-width: 760px) {
      .contact-page {
        padding: 22px 0 48px;
      }
      .contact-page-header {
        margin-bottom: 24px;
      }
      .contact-card {
        padding: 34px 22px;
        border-radius: 22px;
      }
      .form-grid {
        grid-template-columns: 1fr;
      }
      .radio-options {
        display: grid;
      }
    }
  </style>
</head>
<body>
  <main class="contact-page">
    <div class="container">
      <header class="contact-page-header">
        <a class="brand" href="./index.html" aria-label="SMC株式会社 トップへ戻る">
          <span class="brand-text"><strong>SMC</strong><small>株式会社</small></span>
        </a>
        <a href="./index.html#contact">トップへ戻る</a>
      </header>

      <section class="contact-card">
        <p class="section-label">CONTACT FORM</p>
        <h1>お問い合わせ</h1>
        <p class="contact-lead">
          BPO、業務委託、通信・営業支援・イベント運営、採用・転籍、協力会社に関するご相談を受け付けるためのフォームです。
        </p>
        <p class="draft-note">
          担当者確認用ドラフトです。現在は入力画面のみで、送信機能はまだ接続していません。
        </p>

        <form class="contact-form" action="#" method="post" aria-label="お問い合わせフォーム">
          <div class="form-grid">
            <div class="form-radio-group">
              <p class="form-label">お問い合わせ種別<span class="required">必須</span></p>
              <div class="radio-options">
                <label><input type="radio" name="type" value="business">仕事のご相談</label>
                <label><input type="radio" name="type" value="recruit">採用・転籍のご相談</label>
                <label><input type="radio" name="type" value="partner">協力・外注のご相談</label>
              </div>
            </div>
            <div class="form-field">
              <label for="company">会社名・団体名</label>
              <input id="company" name="company" type="text" placeholder="例：株式会社〇〇">
            </div>
            <div class="form-field">
              <label for="name">お名前<span class="required">必須</span></label>
              <input id="name" name="name" type="text" placeholder="例：山田 太郎">
            </div>
            <div class="form-field">
              <label for="email">メールアドレス<span class="required">必須</span></label>
              <input id="email" name="email" type="email" placeholder="example@example.com">
            </div>
            <div class="form-field">
              <label for="phone">電話番号</label>
              <input id="phone" name="phone" type="tel" placeholder="任意">
            </div>
            <div class="form-field-wide">
              <label for="message">お問い合わせ内容<span class="required">必須</span></label>
              <textarea id="message" name="message" placeholder="ご相談内容をご記入ください。"></textarea>
            </div>
          </div>
          <div class="form-actions">
            <button class="button button-disabled submit-disabled" type="button" aria-disabled="true">送信機能準備中</button>
            <p class="form-note">公開時に、Googleフォーム・外部フォーム・メール送信機能のいずれかへ接続します。</p>
          </div>
        </form>
      </section>
    </div>
  </main>
</body>
</html>
